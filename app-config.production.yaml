app:
  title: My Company Developer Portal
  baseUrl: https://backstage-629511660633.us-central1.run.app

organization:
  name: My Company

backend:
  baseUrl: https://backstage-629511660633.us-central1.run.app
  listen:
    port: ${PORT}
    host: 0.0.0.0
  auth:
    externalAccess:
      - type: static
        options:
          token: ${BACKEND_SECRET}
          subject: legacy-default-config
  cors:
    origin:
      - https://backstage-629511660633.us-central1.run.app
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: /cloudsql/${PROJECT_ID}:${REGION}:backstage-db
      user: backstage
      password: ${BACKSTAGE_DB_PASS}
      database: backstage
  reading:
    allow:
      - host: github.com
      - host: raw.githubusercontent.com

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  environment: production
  providers:
    google:
      production:
        clientId: ${AUTH_GOOGLE_CLIENT_ID}
        clientSecret: ${AUTH_GOOGLE_CLIENT_SECRET}
    okta:
      production:
        clientId: ${AUTH_OKTA_CLIENT_ID}
        clientSecret: ${AUTH_OKTA_CLIENT_SECRET}
        audience: ${AUTH_OKTA_AUDIENCE}

techdocs:
  builder: external
  generator:
    runIn: local
  publisher:
    type: googleGcs
    googleGcs:
      bucketName: ${PROJECT_ID}-techdocs

scaffolder:
  defaultAuthor:
    name: Backstage
    email: backstage@elitecorpusa.com

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow:
        - Component
        - System
        - API
        - Resource
        - Location
        - Group
        - User
        - Template

permission:
  enabled: true

# Fix: disable notifications email processor
notifications:
  processors:
    email:
      disabled: true