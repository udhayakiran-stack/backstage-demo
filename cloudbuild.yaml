steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_IMAGE}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'backstage'
      - '--image=${_IMAGE}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--service-account=backstage-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=${PROJECT_ID}:${_REGION}:backstage-db'
      - '--set-secrets=AUTH_GOOGLE_CLIENT_ID=AUTH_GOOGLE_CLIENT_ID:latest,AUTH_GOOGLE_CLIENT_SECRET=AUTH_GOOGLE_CLIENT_SECRET:latest,BACKSTAGE_DB_PASS=BACKSTAGE_DB_PASS:latest,GITHUB_TOKEN=GITHUB_TOKEN:latest'
      - '--set-env-vars=PROJECT_ID=${PROJECT_ID},REGION=${_REGION}'
      - '--port=7007'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--allow-unauthenticated'
      - '--project=${PROJECT_ID}'

substitutions:
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/backstage/app:${SHORT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY